steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "portfolio"
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "portfolio"
    entrypoint: gcloud
timeout: 1200s
images:
  - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_IMAGE"
options:
  logging: CLOUD_LOGGING_ONLY
